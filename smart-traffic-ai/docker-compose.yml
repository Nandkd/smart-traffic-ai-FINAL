# docker-compose.yml
# ====================
# One-command full-stack deployment:
#   docker-compose up --build
#
# Services:
#   backend  → Flask API on :5000
#   frontend → Nginx + React on :80
#
# Access:
#   http://localhost       → React app
#   http://localhost/api/  → Flask API (proxied)

version: "3.9"

services:

  # ── Flask Backend ─────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traffic-ai-backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-secret}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-jwt}
    volumes:
      - ./backend/uploads:/app/backend/uploads        # persist uploads
      - ./ml_models/weights:/app/ml_models/weights     # persist model weights
      - ./traffic_system.db:/app/backend/traffic_system.db  # persist SQLite
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - traffic-net

  # ── React Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traffic-ai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traffic-net

networks:
  traffic-net:
    driver: bridge

volumes:
  ml_weights:
  sqlite_db:
